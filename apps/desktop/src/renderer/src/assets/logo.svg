<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="netnyahoo">
  <defs>
    <!-- Y2K iridescent candy gradient: aqua -> lavender -> hot pink -->
    <linearGradient id="nn-badge" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5BE8FF"/>
      <stop offset="0.5" stop-color="#B98CFF"/>
      <stop offset="1" stop-color="#FF6FD8"/>
    </linearGradient>
    <!-- soft top gloss -->
    <linearGradient id="nn-gloss" x1="256" y1="46" x2="256" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nn-spark" x1="380" y1="96" x2="430" y2="146" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DBFF5B"/>
      <stop offset="1" stop-color="#5BE8FF"/>
    </linearGradient>
  </defs>

  <!-- glossy squircle badge -->
  <rect x="46" y="46" width="420" height="420" rx="124" fill="url(#nn-badge)"/>
  <!-- gloss highlight -->
  <rect x="70" y="66" width="372" height="210" rx="104" fill="url(#nn-gloss)"/>

  <!-- orbit ring (browser / globe nod) -->
  <ellipse cx="256" cy="286" rx="150" ry="64" transform="rotate(-22 256 286)"
           stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="14" fill="none"/>

  <!-- rounded 'n' monogram -->
  <g stroke="#FFFFFF" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M178 360 V206"/>
    <path d="M178 258 C178 200 334 200 334 262 V360"/>
  </g>

  <!-- 4-point sparkle accent -->
  <path d="M405 84 C411 116 416 121 448 127 C416 133 411 138 405 170 C399 138 394 133 362 127 C394 121 399 116 405 84 Z"
        fill="url(#nn-spark)"/>
</svg>
